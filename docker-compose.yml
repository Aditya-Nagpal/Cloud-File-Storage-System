services:
    redis:
        image: redis:alpine
        container_name: fastfiles-redis
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - fastfiles-network

    asynqmon:
        image: hibiken/asynqmon:latest
        platform: linux/amd64 # This forces the M1/M2/M3 to run the Intel version
        container_name: fastfiles-monitor
        ports:
            - "8081:8080"
        command: ["--redis-addr=redis:6379"]
        depends_on:
            - redis
        networks:
            - fastfiles-network

networks:
    fastfiles-network:
        driver: bridge

volumes:
    redis_data:
